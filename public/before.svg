<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" width="360" height="640">
  <defs>
    <!-- Background gradient: warm ivory -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2e6d9"/>
      <stop offset="100%" stop-color="#ddc8b0"/>
    </linearGradient>
    <!-- Skin gradient -->
    <radialGradient id="skin" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fcd8b2"/>
      <stop offset="70%" stop-color="#f0b888"/>
      <stop offset="100%" stop-color="#d99060"/>
    </radialGradient>
    <!-- Hair gradient -->
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c1a0e"/>
      <stop offset="100%" stop-color="#1a0c06"/>
    </linearGradient>
    <!-- Lip gradient -->
    <linearGradient id="lip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a090"/>
      <stop offset="100%" stop-color="#c87860"/>
    </linearGradient>
    <!-- Neck shadow -->
    <linearGradient id="neck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0b888"/>
      <stop offset="100%" stop-color="#d99060"/>
    </linearGradient>
    <!-- Clothes gradient -->
    <linearGradient id="clothes" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#c4a882"/>
      <stop offset="100%" stop-color="#a8906a"/>
    </linearGradient>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="hairblur">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="360" height="640" fill="url(#bg)"/>

  <!-- Subtle background texture arcs -->
  <circle cx="360" cy="0" r="280" fill="none" stroke="#e8d4c0" stroke-width="60" opacity="0.25"/>
  <circle cx="0" cy="640" r="200" fill="none" stroke="#e8d4c0" stroke-width="40" opacity="0.2"/>

  <!-- === HAIR (back layer) === -->
  <!-- Back of hair, wide and full -->
  <ellipse cx="180" cy="195" rx="110" ry="125" fill="url(#hair)"/>
  <!-- Long hair flowing down left -->
  <path d="M80 240 C65 310 62 400 70 500 C74 540 80 580 85 630 L72 640 L55 640 C50 590 44 550 42 500 C34 400 38 300 58 230 Z" fill="#2c1a0e"/>
  <!-- Long hair flowing down right -->
  <path d="M280 240 C295 310 298 400 290 500 C286 540 280 580 275 630 L288 640 L305 640 C310 590 316 550 318 500 C326 400 322 300 302 230 Z" fill="#2c1a0e"/>
  <!-- Hair volume left side -->
  <path d="M75 180 C68 160 70 130 80 108 C92 82 115 62 145 52" stroke="#2c1a0e" stroke-width="28" fill="none" stroke-linecap="round" filter="url(#hairblur)"/>
  <!-- Hair volume right side -->
  <path d="M285 180 C292 160 290 130 280 108 C268 82 245 62 215 52" stroke="#2c1a0e" stroke-width="28" fill="none" stroke-linecap="round" filter="url(#hairblur)"/>
  <!-- Center parting -->
  <path d="M180 52 L180 170" stroke="#1a0c06" stroke-width="3" opacity="0.5"/>

  <!-- === NECK === -->
  <rect x="153" y="340" width="54" height="72" rx="12" fill="url(#neck)"/>
  <!-- Neck shadow line -->
  <line x1="168" y1="342" x2="168" y2="408" stroke="#c89060" stroke-width="1" opacity="0.4"/>
  <line x1="192" y1="342" x2="192" y2="408" stroke="#c89060" stroke-width="1" opacity="0.4"/>

  <!-- === SHOULDERS & SIMPLE TOP === -->
  <!-- Kurti / simple top -->
  <path d="M40 430 C40 400 100 378 153 370 L207 370 C260 378 320 400 320 430 L335 640 L25 640 Z" fill="url(#clothes)"/>
  <!-- Collar area -->
  <path d="M153 370 C158 382 165 388 180 390 C195 388 202 382 207 370" fill="#b89870" stroke="#a08858" stroke-width="1"/>
  <!-- Simple neckline border -->
  <path d="M40 430 C80 415 130 405 153 400 C165 406 180 408 207 400 C230 405 280 415 320 430" stroke="#a08858" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Dupatta hint at shoulder -->
  <path d="M25 480 C30 460 38 448 50 444" stroke="#b8a080" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- === FACE === -->
  <ellipse cx="180" cy="230" rx="96" ry="112" fill="url(#skin)"/>
  <!-- Chin / jaw narrowing -->
  <path d="M108 270 C106 310 130 348 180 356 C230 348 254 310 252 270" fill="url(#skin)"/>
  <!-- Subtle cheek definition -->
  <ellipse cx="120" cy="268" rx="28" ry="16" fill="#f0906a" opacity="0.08" filter="url(#softblur)"/>
  <ellipse cx="240" cy="268" rx="28" ry="16" fill="#f0906a" opacity="0.08" filter="url(#softblur)"/>

  <!-- === FRONT HAIR LAYER (over face edges) === -->
  <path d="M84 200 C78 182 80 158 88 138 C98 112 118 90 148 74 C162 68 172 65 180 65" stroke="#2c1a0e" stroke-width="30" fill="none" stroke-linecap="round" filter="url(#hairblur)"/>
  <path d="M276 200 C282 182 280 158 272 138 C262 112 242 90 212 74 C198 68 188 65 180 65" stroke="#2c1a0e" stroke-width="30" fill="none" stroke-linecap="round" filter="url(#hairblur)"/>
  <!-- Hair wisp / baby hairs at forehead -->
  <path d="M148 110 C152 118 155 128 152 138" stroke="#2c1a0e" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M158 106 C160 116 160 126 158 136" stroke="#2c1a0e" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>

  <!-- === EYEBROWS (natural, not heavily filled) === -->
  <path d="M120 188 C130 182 142 180 154 183" stroke="#3d2010" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.75"/>
  <path d="M206 183 C218 180 230 182 240 188" stroke="#3d2010" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.75"/>

  <!-- === LEFT EYE === -->
  <ellipse cx="137" cy="212" rx="20" ry="11" fill="white"/>
  <!-- Iris -->
  <circle cx="137" cy="212" r="9" fill="#7a4c28"/>
  <circle cx="137" cy="212" r="6" fill="#3a2010"/>
  <!-- Pupil -->
  <circle cx="137" cy="212" r="3.5" fill="#0a0504"/>
  <!-- Catchlight -->
  <circle cx="140" cy="208" r="2.5" fill="white"/>
  <!-- Upper lash line (minimal) -->
  <path d="M117 212 C122 207 130 205 137 205 C144 205 152 207 157 212" stroke="#3d2010" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Lower lash line (very subtle) -->
  <path d="M118 214 C125 218 131 219 137 219 C143 219 149 218 156 214" stroke="#3d2010" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- === RIGHT EYE === -->
  <ellipse cx="223" cy="212" rx="20" ry="11" fill="white"/>
  <circle cx="223" cy="212" r="9" fill="#7a4c28"/>
  <circle cx="223" cy="212" r="6" fill="#3a2010"/>
  <circle cx="223" cy="212" r="3.5" fill="#0a0504"/>
  <circle cx="226" cy="208" r="2.5" fill="white"/>
  <path d="M203 212 C208 207 216 205 223 205 C230 205 238 207 243 212" stroke="#3d2010" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M204 214 C211 218 217 219 223 219 C229 219 235 218 242 214" stroke="#3d2010" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- === NOSE === -->
  <path d="M175 222 C173 238 170 252 168 262 C172 267 176 269 180 269 C184 269 188 267 192 262 C190 252 187 238 185 222" fill="none" stroke="#c89060" stroke-width="1.2" opacity="0.5"/>
  <!-- Nostrils -->
  <ellipse cx="170" cy="264" rx="7" ry="4" fill="#c89060" opacity="0.25"/>
  <ellipse cx="190" cy="264" rx="7" ry="4" fill="#c89060" opacity="0.25"/>

  <!-- === LIPS (natural, soft pink) === -->
  <!-- Upper lip -->
  <path d="M150 295 C157 289 165 286 180 287 C195 286 203 289 210 295 C203 292 195 291 180 291 C165 291 157 292 150 295 Z" fill="#e09880"/>
  <!-- Cupid's bow -->
  <path d="M150 295 C158 289 166 286 172 288 C176 290 178 292 180 291 C182 292 184 290 188 288 C194 286 202 289 210 295" stroke="#d08870" stroke-width="1" fill="none"/>
  <!-- Lower lip -->
  <path d="M150 295 C155 305 165 312 180 313 C195 312 205 305 210 295 Z" fill="url(#lip)" opacity="0.85"/>
  <!-- Lip highlight -->
  <ellipse cx="180" cy="307" rx="14" ry="4" fill="white" opacity="0.12"/>

  <!-- BEFORE label -->
  <rect x="12" y="12" width="80" height="26" rx="5" fill="rgba(60,30,10,0.5)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="52" y="29" text-anchor="middle" fill="#f5e4b7" font-family="Montserrat, Arial, sans-serif" font-size="9.5" letter-spacing="2.5" font-weight="600">BEFORE</text>

  <!-- "Without Jewelry" label at bottom -->
  <rect x="70" y="598" width="220" height="28" rx="6" fill="rgba(60,30,10,0.35)"/>
  <text x="180" y="617" text-anchor="middle" fill="#e8d5c0" font-family="Montserrat, Arial, sans-serif" font-size="9" letter-spacing="2" opacity="0.9">NO MAKEUP · NO JEWELRY</text>
</svg>
